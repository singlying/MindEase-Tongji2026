<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindEase - 智能心理健康支持平台</title>
    <!-- Font Awesome 图标库 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function loadCubismCore() {
        var primary = "https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js";
        var fallback = "https://cdn.jsdelivr.net/npm/live2dcubismcore@1.0.2/live2dcubismcore.min.js";

        function appendScript(src, onError) {
          var script = document.createElement("script");
          script.src = src;
          script.async = false;
          if (onError) {
            script.onerror = onError;
          }
          document.head.appendChild(script);
        }

        appendScript(primary, function () {
          console.warn("Failed to load Cubism Core from official CDN, trying fallback CDN.");
          appendScript(fallback);
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
