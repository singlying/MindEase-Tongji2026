spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:3306}/${SPRING_DATASOURCE_DATABASE:mindease}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 10MB

server:
  port: 8080

mybatis:
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

mindease:
  jwt:
    secret-key: ${MINDEASE_JWT_SECRET_KEY:}
    ttl: 7200000
  security:
    aes-key: ${MINDEASE_SECURITY_AES_KEY:}
  speech:
    asr-model: ${MINDEASE_SPEECH_ASR_MODEL:paraformer-v2}
    tts-model: ${MINDEASE_SPEECH_TTS_MODEL:sambert-zhichu-v1}
    tts-voice: ${MINDEASE_SPEECH_TTS_VOICE:longxiaochun}
    tts-format: ${MINDEASE_SPEECH_TTS_FORMAT:mp3}
    tts-sample-rate: ${MINDEASE_SPEECH_TTS_SAMPLE_RATE:22050}

langchain4j:
  community:
    dashscope:
      chat-model:
        model-name: qwen-max
        api-key: ${DASHSCOPE_API_KEY:}
      streaming-chat-model:
        model-name: qwen-max
        api-key: ${DASHSCOPE_API_KEY:}
      embedding-model:
        model-name: text-embedding-v3
        api-key: ${DASHSCOPE_API_KEY:}

    redis:
      host: localhost
      port: 6379

