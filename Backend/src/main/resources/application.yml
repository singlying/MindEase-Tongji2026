server:
  port: 8080

spring:
  application:
    name: mindease-backend
  
  # MySQL Configuration
  datasource:
    url: jdbc:mysql://${SPRING_DATASOURCE_URL:mindease-mysql:3306/mindease}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # Redis Configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:mindease-redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: 0
      timeout: 3000ms

# Logging
logging:
  level:
    com.mindease: debug
    org.hibernate.SQL: debug
