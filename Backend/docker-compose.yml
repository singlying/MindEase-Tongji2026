services:
  mindease-mysql:
    image: mysql:8.0
    container_name: mindease-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mindease
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - mindease-network

  mindease-redis:
    image: redis:latest
    container_name: mindease-redis
    ports:
      - "6379:6379"
    networks:
      - mindease-network

  mindease-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindease-backend
    ports:
      - "8080:8080"
    depends_on:
      - mindease-mysql
      - mindease-redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mindease-mysql:3306/mindease?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: mindease-redis
      SPRING_DATA_REDIS_PORT: 6379
    networks:
      - mindease-network

networks:
  mindease-network:
    driver: bridge

volumes:
  mysql-data: